{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto pb-10">
    <!-- Header -->
    <div class="mb-4 py-4 flex items-center gap-3">
        <a href="{{ url_for('blogs') }}" class="w-8 h-8 rounded-full bg-black/5 dark:bg-white/5 flex items-center justify-center text-gray-500 hover:text-violet-500 transition-colors">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h2 class="text-2xl font-bold dark:text-white flex items-center bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-fuchsia-500">
            Write a Blog Post
        </h2>
    </div>

    <div class="card-glass p-6">
        <form id="blog-form" action="{{ url_for('create_blog') }}" method="POST" enctype="multipart/form-data" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
            <!-- Title -->
            <div>
                <label for="title" class="block text-sm font-semibold mb-2 ml-1 text-gray-800 dark:text-gray-200">Blog Title</label>
                <input type="text" id="title" name="title" required class="w-full py-3 px-4 rounded-2xl bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 focus:border-violet-500 focus:ring-0 text-lg font-bold dark:text-white transition-all shadow-inner" placeholder="An engaging title...">
            </div>
            
            <!-- Cover Media -->
            <div>
                <label class="block text-sm font-semibold mb-2 ml-1 text-gray-800 dark:text-gray-200">Cover Media (Optional)</label>
                <label id="media-dropzone" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-violet-300 dark:border-violet-700/50 rounded-2xl cursor-pointer bg-violet-50/50 dark:bg-violet-900/10 hover:bg-violet-100 dark:hover:bg-violet-900/30 transition-colors group">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <i class="fas fa-cloud-upload-alt text-3xl text-violet-400 group-hover:text-violet-500 mb-2 transition-colors"></i>
                        <p class="mb-1 text-sm text-gray-500 dark:text-gray-400"><span class="font-semibold text-violet-600 dark:text-violet-400">Click to upload</span> or drag and drop</p>
                        <p class="text-xs text-gray-500 dark:text-gray-500" id="file-name-display">PNG, JPG, WEBP, MP4</p>
                    </div>
                    <input id="media" name="media" type="file" class="hidden" accept="image/*,video/*" onchange="document.getElementById('file-name-display').textContent = this.files[0] ? this.files[0].name : 'PNG, JPG, WEBP, MP4';" />
                </label>
            </div>

            <!-- Rich Text Editor -->
            <div>
                <label class="block text-sm font-semibold mb-2 ml-1 text-gray-800 dark:text-gray-200">Content</label>
                <!-- We will use QuillJS for rich formatting (bold, italic, bullets, code) as requested -->
                <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
                <style>
                    /* Customizing Quill to match our glassmorphism aesthetics */
                    .ql-toolbar.ql-snow {
                        border: 1px solid rgba(139, 92, 246, 0.2);
                        background: rgba(255, 255, 255, 0.5);
                        border-top-left-radius: 1rem;
                        border-top-right-radius: 1rem;
                        font-family: inherit;
                    }
                    .dark .ql-toolbar.ql-snow {
                        border-color: rgba(139, 92, 246, 0.3);
                        background: rgba(0, 0, 0, 0.3);
                    }
                    .ql-toolbar.ql-snow * {
                        color: inherit;
                        stroke: currentColor;
                    }
                    .ql-container.ql-snow {
                        border: 1px solid rgba(139, 92, 246, 0.2);
                        border-bottom-left-radius: 1rem;
                        border-bottom-right-radius: 1rem;
                        background: rgba(255, 255, 255, 0.8);
                        min-height: 300px;
                        font-family: inherit;
                        font-size: 1rem;
                    }
                    .dark .ql-container.ql-snow {
                        border-color: rgba(139, 92, 246, 0.3);
                        background: rgba(30, 41, 59, 0.5);
                        color: #f1f5f9;
                    }
                    .ql-editor {
                        padding: 1.5rem;
                    }
                </style>
                
                <div id="editor-container"></div>
                <!-- Hidden input to hold the HTML content that will be submitted to Flask -->
                <input type="hidden" name="content" id="hidden-content" required>
            </div>
            
            <!-- Submit -->
            <div class="pt-4 border-t border-gray-100 dark:border-white/5 flex justify-end">
                <button type="submit" class="btn-primary py-3 px-8 text-lg w-full sm:w-auto shadow-lg shadow-violet-500/40">
                    Publish Blog <i class="fas fa-paper-plane ml-2"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- QuillJS Script -->
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize Quill editor with requested features: bold, italic, bullets, codespace
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Write your heart out...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'color': [] }, { 'background': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        // Intercept form submit to copy Quill HTML into the hidden input
        var form = document.getElementById('blog-form');
        form.onsubmit = function() {
            var contentInput = document.getElementById('hidden-content');
            // Get raw HTML code from the editor
            contentInput.value = quill.root.innerHTML;
            
            // Basic validation
            if (quill.getText().trim().length === 0 && !quill.root.querySelector('img, video')) {
                alert("Please add some content to your blog.");
                return false;
            }
            return true;
        };
    });
</script>
{% endblock %}
