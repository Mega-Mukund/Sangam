{% extends 'base.html' %}

{% block content %}
<div class="auth-page-wrapper flex flex-col items-center justify-center">
    <div class="card-glass w-full max-w-md p-8 shadow-2xl border-white/20">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-tr from-violet-600 to-fuchsia-500 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-2xl shadow-lg pulsate">
                <i class="fas fa-lotus"></i>
            </div>
            <h2 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-fuchsia-500 mb-2">Welcome Back</h2>
            <p class="text-gray-500 dark:text-gray-400">Login to your Sangam account</p>
        </div>


        <form action="{{ url_for('login') }}" method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
            <div>
                <label class="block text-sm font-medium mb-1 dark:text-gray-300">Username</label>
                <input type="text" name="username" required class="input-glass" placeholder="Enter your username">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 dark:text-gray-300">Password</label>
                <input type="password" name="password" required class="input-glass" placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-primary w-full mt-6">
                Login <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-500 dark:text-gray-400">
            Don't have an account? <a href="{{ url_for('register') }}" class="text-violet-500 hover:text-violet-600 font-semibold">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
